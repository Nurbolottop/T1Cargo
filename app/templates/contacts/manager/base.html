<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>{% block title %}Менеджер панель{% endblock %}</title>
  <style>
    :root { --bg:#0b1220; --card:#0f1a2e; --text:#e5e7eb; --muted:#9ca3af; --border:#22304a; --accent:#e0b13f; }
    body { margin:0; font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif; background:var(--bg); color:var(--text); }
    a { color:inherit; text-decoration:none; }
    .wrap { max-width: 1100px; margin: 0 auto; padding: 18px 16px 26px; }
    .top { display:flex; align-items:center; justify-content:space-between; gap:12px; margin-bottom:14px; }
    .brand { font-weight:900; letter-spacing:.2px; }
    .nav { display:flex; flex-wrap:wrap; gap:10px; }
    .pill { display:inline-flex; align-items:center; gap:8px; padding:10px 12px; border-radius:999px; border:1px solid var(--border); background:rgba(255,255,255,.02); font-weight:800; }
    .pill.active { background: rgba(224,177,63,.12); border-color: rgba(224,177,63,.4); color: #f8d778; }
    .pill.accent { background: var(--accent); color:#111827; border-color: transparent; }
    .grid { display:grid; grid-template-columns: repeat(12, 1fr); gap:12px; }
    .card { grid-column: span 12; background: rgba(255,255,255,.02); border:1px solid var(--border); border-radius:16px; padding:14px; }
    .h { font-weight:900; margin:0 0 10px; }
    .muted { color: var(--muted); }
    .kpi { display:grid; grid-template-columns: repeat(4, minmax(0, 1fr)); gap:10px; }
    .kpi .box { background: rgba(255,255,255,.02); border:1px solid var(--border); border-radius:14px; padding:12px; }
    .kpi .n { font-size:22px; font-weight:950; }
    .kpi .t { color:var(--muted); font-size:12px; font-weight:800; }
    table { width:100%; border-collapse: collapse; }
    th, td { padding:10px 10px; border-bottom:1px solid var(--border); text-align:left; vertical-align:top; }
    th { color: var(--muted); font-size:12px; text-transform: uppercase; letter-spacing:.06em; }
    .row-actions { display:flex; gap:8px; flex-wrap:wrap; }
    .btn { display:inline-flex; align-items:center; justify-content:center; gap:8px; padding:10px 12px; border-radius:12px; border:1px solid var(--border); background: rgba(255,255,255,.02); color: var(--text); font-weight:900; cursor:pointer; }
    .btn.accent { background: var(--accent); color:#111827; border-color: transparent; }
    input, select { width:100%; padding:10px 12px; border-radius:12px; border:1px solid var(--border); background: rgba(255,255,255,.03); color: var(--text); box-sizing:border-box; }
    label { display:block; font-size:12px; font-weight:900; color: var(--muted); margin:10px 0 6px; }
    .form-row { display:grid; grid-template-columns: repeat(12, 1fr); gap:12px; }
    .col-6 { grid-column: span 6; }
    .col-4 { grid-column: span 4; }
    .col-3 { grid-column: span 3; }
    .col-12 { grid-column: span 12; }
    .error { background: rgba(244,63,94,.12); border:1px solid rgba(244,63,94,.35); color:#fecdd3; padding:10px 12px; border-radius:12px; font-weight:800; }
    @media (max-width: 860px){ .kpi{grid-template-columns: repeat(2, minmax(0, 1fr));} .col-6,.col-4,.col-3{grid-column:span 12;} }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="top">
      <div class="brand">CargoBot • Менеджер</div>
      <div class="nav">
        <a class="pill {% if nav == 'dashboard' %}active{% endif %}" href="{% url 'manager_dashboard' %}">Главная</a>
        <a class="pill {% if nav == 'clients' %}active{% endif %}" href="{% url 'manager_clients' %}">Клиенты</a>
        <a class="pill {% if nav == 'shipments' %}active{% endif %}" href="{% url 'manager_shipments' %}">Посылки</a>
        <a class="pill {% if nav == 'shipments' %}active{% endif %}" href="{% url 'manager_shipments_import' %}">Импорт Excel</a>
        <a class="pill accent" href="{% url 'manager_shipment_new' %}">+ Добавить посылку</a>
        <a class="pill" href="{% url 'manager_logout' %}">Выход</a>
      </div>
    </div>

    {% block content %}{% endblock %}
  </div>
</body>
</html>
