<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Вход менеджера</title>
  <style>
    :root { --bg:#0b1220; --card:#0f1a2e; --text:#e5e7eb; --muted:#9ca3af; --border:#22304a; --accent:#e0b13f; }
    * { box-sizing: border-box; }
    body { margin:0; font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif; background: var(--bg); color:var(--text); }
    .app { min-height:100vh; display:flex; align-items:center; justify-content:center; padding: 22px 14px; background:
        radial-gradient(900px 520px at 15% -10%, rgba(224,177,63,.14), transparent 55%),
        radial-gradient(900px 520px at 90% 0%, rgba(59,130,246,.14), transparent 55%),
        var(--bg);
    }
    .panel { width: 100%; max-width: 420px; background: rgba(15,26,46,.60); border:1px solid rgba(255,255,255,.08); border-radius: 18px; padding: 16px; box-shadow: 0 18px 50px rgba(0,0,0,.38); }
    .brand { font-weight: 950; letter-spacing: .2px; margin-bottom: 10px; }
    .muted { color: var(--muted); font-size: 13px; }
    label { display:block; font-size:12px; font-weight:950; color: var(--muted); margin:12px 0 6px; }
    input { width:100%; padding:12px 12px; border-radius:12px; border:1px solid rgba(255,255,255,.10); background: rgba(255,255,255,.03); color: var(--text); transition: border-color .12s ease, background .12s ease, box-shadow .12s ease; }
    input:focus { outline:none; border-color: rgba(224,177,63,.55); box-shadow: 0 0 0 4px rgba(224,177,63,.12); background: rgba(255,255,255,.04); }
    .btn { width:100%; margin-top:14px; padding:12px 12px; border-radius:12px; border: none; background: rgba(224,177,63,.92); color:#111827; font-weight:950; cursor:pointer; transition: transform .12s ease, background .12s ease; }
    .btn:hover { transform: translateY(-1px); background: rgba(236,195,92,.98); }
    .error { margin-top:12px; background: rgba(244,63,94,.12); border:1px solid rgba(244,63,94,.35); color:#fecdd3; padding:10px 12px; border-radius:12px; font-weight:900; }
  </style>
</head>
<body>
  <div class="app">
    <div class="panel">
      <div class="brand">CargoBot • Вход</div>
      <div class="muted">Логин/пароль создаёт суперпользователь в админке.</div>

      {% if error %}
        <div class="error">{{ error }}</div>
      {% endif %}

      <form method="post">
        {% csrf_token %}
        <label>Логин</label>
        <input name="username" autocomplete="username" required />

        <label>Пароль</label>
        <input name="password" type="password" autocomplete="current-password" required />

        <button class="btn" type="submit">Войти</button>
      </form>
    </div>
  </div>
</body>
</html>
