<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Вход менеджера</title>
  <style>
    :root { --bg:#0b1220; --card:#0f1a2e; --text:#e5e7eb; --muted:#9ca3af; --border:#22304a; --accent:#e0b13f; }
    body { margin:0; font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif; background:var(--bg); color:var(--text); }
    .wrap { max-width: 520px; margin: 0 auto; padding: 34px 16px; }
    .card { background: rgba(255,255,255,.02); border:1px solid var(--border); border-radius:18px; padding: 16px; }
    .h { font-weight:950; margin: 0 0 10px; }
    .muted { color: var(--muted); font-size: 13px; }
    label { display:block; font-size:12px; font-weight:900; color: var(--muted); margin:12px 0 6px; }
    input { width:100%; padding:12px 12px; border-radius:12px; border:1px solid var(--border); background: rgba(255,255,255,.03); color: var(--text); box-sizing:border-box; }
    .btn { width:100%; margin-top:14px; padding:12px 12px; border-radius:12px; border: none; background: var(--accent); color:#111827; font-weight:950; cursor:pointer; }
    .error { margin-top:12px; background: rgba(244,63,94,.12); border:1px solid rgba(244,63,94,.35); color:#fecdd3; padding:10px 12px; border-radius:12px; font-weight:800; }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="card">
      <h1 class="h">Вход менеджера</h1>
      <div class="muted">Логин/пароль создаёт суперпользователь в админке.</div>

      {% if error %}
        <div class="error">{{ error }}</div>
      {% endif %}

      <form method="post">
        {% csrf_token %}
        <label>Логин</label>
        <input name="username" autocomplete="username" required />

        <label>Пароль</label>
        <input name="password" type="password" autocomplete="current-password" required />

        <button class="btn" type="submit">Войти</button>
      </form>
    </div>
  </div>
</body>
</html>
